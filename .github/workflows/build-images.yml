name: Build container images

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      target:
        description: Target ID or all
        required: false
        default: all
        type: string

permissions:
  contents: write
  packages: write

concurrency:
  group: image-build-${{ github.repository }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TARGET: ${{ github.event.inputs.target || 'all' }}
    steps:
      - run: echo "medium probe $TARGET"
